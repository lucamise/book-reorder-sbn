<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Book Reorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        #reader { width: 100%; max-width: 450px; margin: auto; border-radius: 12px; overflow: hidden; border: 4px solid #3b82f6; }
        .dewey-header { background: #1e293b; color: white; padding: 8px 15px; font-weight: bold; border-radius: 6px; margin-top: 20px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        #console { font-family: 'Courier New', monospace; font-size: 11px; background: #000; color: #00ff00; padding: 10px; border-radius: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2"><span>📖</span> BiblioSBN</h1>
            <div class="flex <gap-2">
                <button onclick="exportXls()" class="bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded text-xs font-bold uppercase">Esporta</button>
                <label class="bg-white text-blue-800 px-3 py-1.5 rounded text-xs font-bold cursor-pointer uppercase">
                    Importa <input type="file" id="importFile" class="hidden" accept=".xlsx, .xls">
                </label>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-6">
        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-slate-400 uppercase mb-3">Inquadra Barcode</h2>
                <div id="reader"></div>
                <p id="scanStatus" class="mt-3 text-center text-sm font-bold text-blue-600 italic">In attesa...</p>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                <h2 class="text-xs font-black text-slate-400 uppercase mb-3">Inserimento Manuale ISBN</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="manualIsbn" placeholder="ISBN (es. 97888...)" 
                           onkeydown="if(event.key === 'Enter') manualSearch()"
                           class="flex-1 border-2 border-slate-100 rounded-lg px-4 py-2 focus:border-blue-500 outline-none">
                    <button onclick="manualSearch()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-700 transition">CERCA</button>
                </div>
                <h2 class="text-xs font-black text-slate-400 uppercase mb-2">Log Attività</h2>
                <div id="console">Sistema pronto.</div>
                <button onclick="clearAll()" class="mt-4 text-red-500 text-[10px] font-bold uppercase hover:underline self-end">Svuota database</button>
            </div>
        </div>

        <div id="libraryBody"></div>
    </main>

    <script>
        let myLibrary = JSON.parse(localStorage.getItem('sbn_v5_lib')) || [];
        const proxy = "https://corsproxy.io/?";
        
        // NUOVO: Variabile per impedire scansioni multiple
        let isProcessing = false;

        window.onload = () => {
            initScanner();
            renderLibrary();
        };

        function addLog(msg, color = "#00ff00") {
            const con = document.getElementById('console');
            con.innerHTML += `<div style="color: ${color}">> ${msg}</div>`;
            con.scrollTop = con.scrollHeight;
        }

        function initScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (text) => { 
                    // Modificato: controlla se il sistema è occupato
                    if (text.length >= 10 && !isProcessing) { 
                        runSbnSearch(text); 
                    } 
                }
            ).catch(err => addLog("Errore camera: " + err, "red"));
        }

        function manualSearch() {
            const val = document.getElementById('manualIsbn').value.trim();
            if (val && !isProcessing) runSbnSearch(val);
        }

        async function runSbnSearch(isbn) {
            // Blocca nuove scansioni
            isProcessing = true; 
            
            addLog(`Fase 1: Ricerca ISBN ${isbn}...`);
            document.getElementById('scanStatus').innerText = "Fase 1 in corso...";

            try {
                const searchUrl = `http://opac.sbn.it/opacmobilegw/search.json?isbn=${isbn}`;
                const response = await fetch(proxy + encodeURIComponent(searchUrl));
                const data = await response.json();

                if (data.briefRecords && data.briefRecords.length > 0) {
                    const bid = data.briefRecords[0].codiceIdentificativo;
                    addLog(`BID ottenuto: ${bid}`);
                    await fetchFullRecord(bid, isbn);
                } else {
                    addLog(`Nessun risultato per ISBN ${isbn}`, "orange");
                    document.getElementById('scanStatus').innerText = "Non trovato.";
                    resetScannerDelay(); // Sblocca dopo errore
                }
            } catch (err) {
                addLog(`Errore Fase 1: ${err.message}`, "red");
                resetScannerDelay(); // Sblocca dopo errore
            }
        }

        async function fetchFullRecord(bid, isbn) {
            addLog(`Fase 2: Recupero metadati per BID ${bid}...`);
            document.getElementById('scanStatus').innerText = "Fase 2 in corso...";

            try {
                const encodedBid = encodeURIComponent(bid);
                const fullUrl = `http://opac.sbn.it/opacmobilegw/full.json?bid=${encodedBid}`;
                const response = await fetch(proxy + encodeURIComponent(fullUrl));
                const data = await response.json();

                if (!data.titolo) throw new Error("Record vuoto");

                let dewey = "NON CLASS.";
                if (data.classificazioneDewey) {
                    const d = data.classificazioneDewey;
                    if (Array.isArray(d) && d.length > 0) {
                        dewey = d[0].notazione || d[0].codice || d[0].valore || (typeof d[0] === 'string' ? d[0] : "N.C.");
                    } else if (typeof d === 'object') {
                        dewey = d.notazione || d.codice || "N.C.";
                    } else if (typeof d === 'string') {
                        dewey = d;
                    }
                }
                
                if (!dewey || dewey === "undefined") dewey = "NON CLASS.";

                const newBook = {
                    id: Date.now() + Math.random(),
                    isbn: isbn,
                    titolo: data.titolo,
                    autore: data.responsabilitaPrincipale || "Autore non indicato",
                    dewey: dewey.toString().trim()
                };

                myLibrary.push(newBook);
                save();
                addLog(`SUCCESSO: ${newBook.titolo.substring(0, 25)}...`);
                document.getElementById('manualIsbn').value = "";
                document.getElementById('scanStatus').innerText = "Aggiunto! Attendi...";
                
                // Avvia il cooldown prima della prossima scansione
                resetScannerDelay();

            } catch (err) {
                addLog(`Errore Fase 2: ${err.message}`, "red");
                document.getElementById('scanStatus').innerText = "Errore dati.";
                resetScannerDelay();
            }
        }

        // NUOVO: Funzione per gestire il ritardo (3 secondi)
        function resetScannerDelay() {
            setTimeout(() => {
                isProcessing = false;
                document.getElementById('scanStatus').innerText = "Pronto per nuovo codice";
                addLog("Scanner pronto.", "#3b82f6");
            }, 3000); // 3000 millisecondi = 3 secondi
        }

        function save() {
            localStorage.setItem('sbn_v5_lib', JSON.stringify(myLibrary));
            renderLibrary();
        }

        function removeDeweyGroup(deweyKey) {
            if (confirm(`Sei sicuro di voler eliminare TUTTI i libri della classe Dewey: ${deweyKey}?`)) {
                myLibrary = myLibrary.filter(book => book.dewey !== deweyKey);
                save();
                addLog(`Gruppo Dewey ${deweyKey} rimosso.`, "orange");
            }
        }

        function renderLibrary() {
            const container = document.getElementById('libraryBody');
            container.innerHTML = '';

            if (myLibrary.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-slate-400 text-sm">Nessun libro salvato.</p>';
                return;
            }

            const groups = myLibrary.reduce((acc, b) => {
                const key = b.dewey || "NON CLASS.";
                if (!acc[key]) acc[key] = [];
                acc[key].push(b); return acc;
            }, {});

            const sortedKeys = Object.keys(groups).sort();
            let rank = 1;

            sortedKeys.forEach(key => {
                const header = document.createElement('div');
                header.className = 'dewey-header shadow-sm';
                header.innerHTML = `
                    <span>Classe Dewey: ${key}</span>
                    <button onclick="removeDeweyGroup('${key}')" 
                            class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-[10px] uppercase transition shadow-sm">
                        Elimina Gruppo
                    </button>
                `;
                container.appendChild(header);

                groups[key].sort((a,b) => a.titolo.localeCompare(b.titolo)).forEach(book => {
                    const row = document.createElement('div');
                    row.className = 'bg-white p-4 border-b flex justify-between items-center hover:bg-slate-50 transition';
                    row.innerHTML = `
                        <div class="flex items-center gap-4 overflow-hidden">
                            <span class="text-xl font-black text-slate-200 w-8">#${rank++}</span>
                            <div class="overflow-hidden">
                                <h4 class="font-bold text-slate-800 text-[11px] uppercase truncate">${book.titolo}</h4>
                                <p class="text-[10px] text-slate-500 truncate">${book.autore}</p>
                                <p class="text-[9px] font-mono text-slate-400 italic">ISBN: ${book.isbn}</p>
                            </div>
                        </div>
                        <button onclick="removeBook(${book.id})" class="text-slate-300 hover:text-red-500 p-2">✕</button>
                    `;
                    container.appendChild(row);
                });
            });
        }

        function removeBook(id) {
            myLibrary = myLibrary.filter(b => b.id !== id);
            save();
        }

        function clearAll() {
            if(confirm("Vuoi resettare tutto?")) { myLibrary = []; save(); }
        }

        function exportXls() {
            const data = [];
            let r = 1;
            const groups = myLibrary.reduce((acc, b) => {
                const key = b.dewey || "NON CLASS.";
                if (!acc[key]) acc[key] = [];
                acc[key].push(b); return acc;
            }, {});

            Object.keys(groups).sort().forEach(key => {
                groups[key].sort((a,b) => a.titolo.localeCompare(b.titolo)).forEach(book => {
                    data.push({ Rank: r++, Dewey: book.dewey, Titolo: book.titolo, Autore: book.autore, ISBN: book.isbn });
                });
            });

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Libri");
            XLSX.writeFile(wb, "catalogo_sbn.xlsx");
        }

        document.getElementById('importFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                myLibrary = [...myLibrary, ...rows.map(r => ({
                    id: Date.now() + Math.random(),
                    isbn: r.ISBN || "",
                    titolo: r.Titolo || r.titolo || "",
                    autore: r.Autore || r.autore || "",
                    dewey: r.Dewey || r.dewey || "N.C."
                }))];
                save();
            };
            reader.readAsBinaryString(e.target.files[0]);
        });
    </script>
</body>
</html>
